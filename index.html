</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- CẤU HÌNH API & HẰNG SỐ ---
        // Khi mang ra ngoài chạy độc lập, hãy tạo API Key mới từ Google AI Studio và dán vào giữa 2 dấu ngoặc kép này:
        const DEFAULT_API_KEY = "AIzaSyBtoV_p7xApY60TvKA5zRcsOD4v4f_k9hk"; 
        const FOCUS_TIME = 25 * 60; // 25 phút
        const BREAK_TIME = 5 * 60; // 5 phút

        const GEMINI_MODELS = [
          { id: 'auto', name: '🤖 Tự động chọn (Tối ưu nhất)', desc: 'Tự động kiểm tra và dùng model chạy được đầu tiên.' },
          { id: 'gemini-2.5-flash-preview-09-2025', name: 'Gemini 2.5 Flash Preview', desc: 'Mô hình hỗ trợ tốt nhất cho môi trường hiện tại.' },
          { id: 'gemini-2.5-flash', name: 'Gemini 2.5 Flash', desc: 'Thế hệ mới nhất, nhanh và thông minh hơn.' },
          { id: 'gemini-2.0-flash', name: 'Gemini 2.0 Flash', desc: 'Tốc độ phản hồi cực nhanh.' },
          { id: 'gemini-1.5-flash', name: 'Gemini 1.5 Flash', desc: 'Độ ổn định cao và đa dụng.' },
          { id: 'gemini-1.5-flash-8b', name: 'Gemini 1.5 Flash 8B', desc: 'Model gọn nhẹ nhất.' }

        // ĐÃ NÂNG CẤP LẦN CUỐI: Thay thế máy chủ Pixabay bằng CDN lưu trữ của Freesound.org - Tốc độ tức thì và KHÔNG BAO GIỜ chặn CORS/Hotlink.
        const AMBIENT_SOUNDS = [
          { id: 'none', name: 'Không âm thanh', url: '', type: 'none' },
          { id: 'synth-alpha', name: '🧠 Sóng não Alpha (Tự tạo - Tập trung sâu)', url: 'synth-alpha', type: 'synth' },
          { id: 'synth-rain', name: '🌧️ Tiếng mưa rào (Tự tạo - Êm dịu)', url: 'synth-rain', type: 'synth' },
          { id: 'rain', name: '🌧️ Mưa rơi mái hiên (FreeSound MP3)', url: 'https://cdn.freesound.org/previews/531/531947_11142075-hq.mp3', type: 'url' },
          { id: 'waves', name: '🌊 Sóng biển rì rào (FreeSound MP3)', url: 'https://cdn.freesound.org/previews/400/400632_5121236-hq.mp3', type: 'url' },
          { id: 'lofi', name: '🎵 Lofi Chill nhẹ nhàng (Hypebeast Free Music)', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3', type: 'url' },
        ];

        const RIDDLES = [
          { q: "Cái gì đen khi bạn mua nó, đỏ khi dùng nó và xám xịt khi vứt nó đi?", options: ["Quả táo", "Than củi", "Cục tẩy", "Đôi giày"], a: "Than củi" },
          { q: "Cái gì có cổ nhưng không có đầu?", options: ["Cái chai", "Cái áo", "Con hươu", "Cây đàn"], a: "Cái áo" },
          { q: "Tháng nào ngắn nhất trong năm?", options: ["Tháng Hai", "Tháng Ba & Tư", "Tháng Năm", "Tháng Mười"], a: "Tháng Hai" },
          { q: "Tôi có răng nhưng không thể nhai. Tôi là ai?", options: ["Cái lược", "Con dao", "Bánh răng", "Cả 3 đều đúng"], a: "Cái lược" },
          { q: "Càng cất đi, bạn càng có nhiều. Nó là gì?", options: ["Tiền bạc", "Bí mật", "Dấu chân", "Tuổi tác"], a: "Dấu chân" },
          { q: "Cái gì luôn đến nhưng không bao giờ đến?", options: ["Ngày mai", "Mùa xuân", "Cơn mưa", "Giấc mơ"], a: "Ngày mai" },
          { q: "Làm thế nào để con cua được chín chân?", options: ["Cắt bớt", "Luộc chín", "Vẽ thêm", "Không thể"], a: "Luộc chín" },
        ];

        // --- INLINE SVG ICONS (Đảm bảo hoạt động độc lập không cần thư viện ngoài) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                play: <path d="m6 3 14 9-14 9V3z"/>,
                pause: <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>,
                square: <rect width="18" height="18" x="3" y="3" rx="2"/>,
                checkCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                xCircle: <><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></>,
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
                brain: <><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-1.45-4.43 2.5 2.5 0 0 1 .41-3.63 2.5 2.5 0 0 1-1.5-4.5 2.5 2.5 0 0 1 3.5-2.5z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 1.45-4.43 2.5 2.5 0 0 0-.41-3.63 2.5 2.5 0 0 0 1.5-4.5 2.5 2.5 0 0 0-3.5-2.5z"/></>,
                message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                send: <><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
                volume: <><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>,
                volumeX: <><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" x2="16" y1="9" y2="15"/><line x1="16" x2="22" y1="9" y2="15"/></>,
                bell: <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                palette: <><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 14.7255 3.09032 17.1962 4.85857 19C5.03345 19.1749 5.1119 19.4187 5.06456 19.6611L4.85338 20.7432C4.74312 21.3066 5.17642 21.8152 5.75051 21.8016L7.3094 21.7645C7.54572 21.7588 7.77197 21.8617 7.92589 22.0416C9.12166 22.1466 10.5186 22 12 22Z"/><circle cx="7.5" cy="10.5" r="1.5"/><circle cx="11.5" cy="7.5" r="1.5"/><circle cx="16.5" cy="9.5" r="1.5"/><circle cx="15.5" cy="14.5" r="1.5"/></>,
                refresh: <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                plus: <><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></>,
                crosshair: <><circle cx="12" cy="12" r="10"/><line x1="22" x2="18" y1="12" y2="12"/><line x1="6" x2="2" y1="12" y2="12"/><line x1="12" x2="12" y1="6" y2="2"/><line x1="12" x2="12" y1="22" y2="18"/></>,
                grid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
                x: <><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></>,
                menu: <><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="18" y2="18"/></>,
                alert: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12" y1="17" y2="17.01"/></>,
                cpu: <><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                info: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12" y1="8" y2="8"/></>,
                paperclip: <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>,
                image: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>
            };

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={`${className}`}
                >
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- CÁC HÀM TIỆN ÍCH ---
        const formatTime = (seconds) => {
          const m = Math.floor(seconds / 60).toString().padStart(2, '0');
          const s = (seconds % 60).toString().padStart(2, '0');
          return `${m}:${s}`;
        };

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = error => reject(error);
        });

        // --- API HỖ TRỢ ---
        const callGeminiAPI = async (prompt, imageBase64 = null, pdfBase64 = null, isVerification = false, selectedModel = 'auto', apiKeyToUse = DEFAULT_API_KEY, onAutoDetect = null) => {
          const delay = ms => new Promise(res => setTimeout(res, ms));
          let retries = 3;
          const backoff = [1000, 2000, 4000];

          const payload = {
            contents: [{ role: "user", parts: [{ text: prompt }] }]
          };

          if (imageBase64) {
            payload.contents[0].parts.push({ inlineData: { mimeType: "image/jpeg", data: imageBase64 } });
          }
          if (pdfBase64) {
            payload.contents[0].parts.push({ inlineData: { mimeType: "application/pdf", data: pdfBase64 } });
          }

          if (isVerification) {
            payload.systemInstruction = {
              parts: [{ text: "Bạn là một giám thị nghiêm khắc. Nhiệm vụ của bạn là xem ảnh người dùng tải lên và mục tiêu học tập của họ. Hãy trả lời theo định dạng JSON cực kỳ chính xác: { \"pass\": true/false, \"reason\": \"lời giải thích ngắn gọn bằng tiếng Việt\" }. Chỉ cho pass (true) if ảnh thực sự chứng minh được họ đã làm việc liên quan đến các mục tiêu được giao." }]
            };
            payload.generationConfig = { responseMimeType: "application/json" };
          } else {
            payload.systemInstruction = {
              parts: [{ text: "Bạn là một gia sư AI thân thiện, xuất sắc trong mọi lĩnh vực. Hãy giải thích ngắn gọn, súc tích, dễ hiểu. Sử dụng tiếng Việt chuẩn. Có thể giải toán, lý, hóa, lập trình, văn học..." }]
            };
          }

          let modelsToTry = [];
          if (selectedModel === 'auto') {
            modelsToTry = [
              'gemini-2.5-flash-preview-09-2025',
              'gemini-2.5-flash',
              'gemini-2.0-flash',
              'gemini-1.5-flash',
              'gemini-1.5-flash-8b'
            ];
          } else {
            modelsToTry = [selectedModel];
          }

          let lastError = null;

          for (const modelId of modelsToTry) {
            for (let i = 0; i < retries; i++) {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKeyToUse}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });
               
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
               
                if (selectedModel === 'auto' && onAutoDetect) {
                  onAutoDetect(modelId);
                }
               
                return data.candidates[0].content.parts[0].text;
              } catch (err) {
                lastError = err;
                console.warn(`Thử model ${modelId} không thành công (lần thử ${i + 1}): ${err.message}`);
               
                if (selectedModel === 'auto' && i >= 1) {
                  break; 
                }
               
                if (i < retries - 1) {
                  await delay(backoff[i]);
                }
              }
            }
          }

          throw new Error(lastError ? lastError.message : "Tất cả các model Gemini đều không hoạt động.");
        };

        // ================= COMPONENT CHỤP ẢNH WEBCAM =================
        const WebcamModal = ({ onCapture, onClose }) => {
          const videoRef = useRef(null);
          const streamRef = useRef(null);
          const [loading, setLoading] = useState(true);
          const [errorMsg, setErrorMsg] = useState('');

          useEffect(() => {
            let activeStream = null;

            const startCamera = async () => {
              try {
                setLoading(true);
                setErrorMsg('');
               
                const constraints = {
                  video: { facingMode: "user" },
                  audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                activeStream = stream;
                streamRef.current = stream;

                if (videoRef.current) {
                  videoRef.current.srcObject = stream;
                  await videoRef.current.play();
                }
                setLoading(false);
              } catch (err) {
                console.warn("Lỗi camera phụ, đang thử lại bằng camera bất kỳ...", err);
                try {
                  const backupStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                  activeStream = backupStream;
                  streamRef.current = backupStream;
                  if (videoRef.current) {
                    videoRef.current.srcObject = backupStream;
                    await videoRef.current.play();
                  }
                  setLoading(false);
                } catch (backupErr) {
                  console.error("Hoàn toàn không thể mở được camera:", backupErr);
                  setErrorMsg('Không thể mở Camera của thiết bị. Bạn có thể sử dụng chức năng "Tải ảnh" thay thế.');
                  setLoading(false);
                }
              }
            };

            startCamera();

            return () => {
              if (activeStream) {
                activeStream.getTracks().forEach(track => {
                  track.stop();
                });
              }
            };
          }, []);

          const capture = () => {
            if (!videoRef.current || loading || errorMsg) return;
            try {
              const realCanvas = document.createElement('canvas');
              realCanvas.width = videoRef.current.videoWidth || 640;
              realCanvas.height = videoRef.current.videoHeight || 480;
              const realCtx = realCanvas.getContext('2d');
              realCtx.drawImage(videoRef.current, 0, 0, realCanvas.width, realCanvas.height);
              const dataUrl = realCanvas.toDataURL('image/jpeg', 0.85);
              onCapture(dataUrl);
            } catch (e) {
              alert("Lỗi chụp ảnh: " + e.message);
            }
          };

          return (
            <div className="fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-slate-800 rounded-2xl p-4 max-w-lg w-full flex flex-col items-center shadow-2xl border border-slate-700">
                <div className="flex justify-between w-full mb-3">
                  <h3 className="font-bold text-base sm:text-lg text-white flex items-center gap-2"><Icon name="camera" size={18}/> Chụp hình minh chứng</h3>
                  <button onClick={onClose} className="text-slate-400 hover:text-white bg-slate-700 p-1.5 rounded-full"><Icon name="x" size={16}/></button>
                </div>

                <div className="w-full rounded-xl bg-black mb-4 aspect-video relative flex items-center justify-center overflow-hidden border border-slate-700">
                  {loading && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 text-purple-400 gap-2">
                      <Icon name="refresh" className="animate-spin" size={24} />
                      <span className="text-xs">Đang mở camera...</span>
                    </div>
                  )}

                  {errorMsg && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center p-4 bg-slate-900 text-red-400 text-center text-xs">
                      <Icon name="xCircle" size={32} className="mb-2" />
                      <p className="font-medium">{errorMsg}</p>
                    </div>
                  )}

                  <video
                    ref={videoRef}
                    autoPlay
                    playsInline
                    muted
                    className={`w-full h-full object-cover ${loading || errorMsg ? 'opacity-0' : 'opacity-100'}`}
                  />
                </div>

                <div className="flex gap-3 w-full">
                  <button
                    type="button"
                    onClick={onClose}
                    className="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 py-3 rounded-xl font-bold text-xs sm:text-sm transition"
                  >
                    Hủy
                  </button>
                  <button
                    type="button"
                    onClick={capture}
                    disabled={loading || !!errorMsg}
                    className="flex-1 bg-purple-600 hover:bg-purple-500 disabled:bg-slate-700 disabled:text-slate-500 text-white py-3 rounded-xl font-bold text-xs sm:text-sm shadow-lg flex justify-center items-center gap-2 transition transform hover:scale-[1.02]"
                  >
                    <Icon name="camera" size={18}/> Chụp ảnh ngay
                  </button>
                </div>
              </div>
            </div>
          );
        };

        // ================= COMPONENT XÁC NHẬN HỦY PHIÊN =================
        const ConfirmDialog = ({ isOpen, onClose, onConfirm }) => {
          if (!isOpen) return null;

          return (
            <div className="fixed inset-0 z-[120] bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-slate-800 rounded-3xl p-6 max-w-sm w-full flex flex-col items-center shadow-2xl border border-red-900/50">
                <div className="w-16 h-16 bg-red-900/30 rounded-full flex items-center justify-center mb-4">
                  <Icon name="alert" size={32} className="text-red-400" />
                </div>
                <h3 className="text-xl font-black text-white mb-2 text-center">Bạn muốn dừng lại?</h3>
                <p className="text-slate-400 text-sm text-center mb-6 leading-relaxed">
                  Phiên học này sẽ bị <span className="text-red-400 font-bold">hủy bỏ</span> và bạn sẽ không được vào trạm nghỉ ngơi giải trí. Bạn có chắc chắn không?
                </p>
               
                <div className="flex gap-3 w-full">
                  <button
                    onClick={onClose}
                    className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold text-sm transition"
                  >
                    Tiếp tục học
                  </button>
                  <button
                    onClick={onConfirm}
                    className="flex-1 py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold text-sm shadow-lg transition"
                  >
                    Chấp nhận dừng
                  </button>
                </div>
              </div>

        // ================= CÁC COMPONENT MINI-GAMES =================
        const RiddleGame = () => {
          const [currentRiddle, setCurrentRiddle] = useState(RIDDLES[0]);
          const [selected, setSelected] = useState(null);
          const [isCorrect, setIsCorrect] = useState(null);

        const TicTacToe = () => {
          const [board, setBoard] = useState(Array(9).fill(null));
          const [isXNext, setIsXNext] = useState(true);
         
          const checkWinner = (squares) => {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let i = 0; i < lines.length; i++) {
              const [a, b, c] = lines[i];
              if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) return squares[a];
            }
            return null;
          };

          const winner = checkWinner(board);
          const isDraw = !winner && board.every(s => s !== null);

          const handleClick = (i) => {
            if (board[i] || winner) return;
            const newBoard = [...board];
            newBoard[i] = isXNext ? 'X' : 'O';
            setBoard(newBoard);
            setIsXNext(!isXNext);
          };

          useEffect(() => {
            if (!isXNext && !winner && !isDraw) {
              const timeout = setTimeout(() => {
                const emptyIndices = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                if (emptyIndices.length > 0) {
                  const randomIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                  handleClick(randomIndex);
                }
              }, 500);
              return () => clearTimeout(timeout);
            }
          }, [isXNext, board, winner, isDraw]);

          return (
            <div className="flex flex-col items-center justify-center w-full max-w-sm mx-auto p-4">
              <h3 className="text-xl font-bold mb-1 text-cyan-400 flex items-center gap-2"><Icon name="grid" /> Cờ Caro (Vs Máy)</h3>
              <div className="mb-3 font-bold text-base h-6">

              </div>
              <div className="grid grid-cols-3 gap-2 bg-slate-800 p-3 rounded-xl border border-slate-700 w-full aspect-square">
                {board.map((cell, i) => (
                  <button
                    key={i}
                    onClick={() => isXNext && handleClick(i)}
                    className="bg-slate-900 text-3xl sm:text-4xl font-bold flex items-center justify-center hover:bg-slate-700/70 transition rounded-lg border border-slate-700 shadow-inner min-h-[70px]"
                  >
                    <span className={cell === 'X' ? 'text-blue-400' : cell === 'O' ? 'text-red-400' : ''}>{cell}</span>
                  </button>
                ))}
              </div>
              {(winner || isDraw) && (
                <button onClick={() => {setBoard(Array(9).fill(null)); setIsXNext(true);}} className="mt-4 px-6 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-full font-bold text-sm transition shadow">Chơi ván mới</button>
              )}
            </div>
          );
        };

        const ReactionGame = () => {
          const [target, setTarget] = useState(null);
          const [score, setScore] = useState(0);
          const [isPlaying, setIsPlaying] = useState(false);
          const areaRef = useRef(null);

          const spawnTarget = useCallback(() => {
            if (!areaRef.current) return;
            const w = areaRef.current.clientWidth - 50;
            const h = areaRef.current.clientHeight - 50;
            setTarget({ x: Math.random() * w, y: Math.random() * h, id: Date.now() });
          }, []);

          useEffect(() => {
            let timer;
            if (isPlaying) {
              if (!target) spawnTarget();
              timer = setInterval(spawnTarget, Math.max(500, 1200 - score * 40));
            } else {
              setTarget(null);
            }
            return () => clearInterval(timer);
          }, [isPlaying, score, target, spawnTarget]);

          const handleHit = () => {

              <div className="flex justify-between items-center w-full mb-3">
                <span className="font-bold text-slate-300 bg-slate-800 px-3 py-1 rounded-lg text-sm">Điểm: {score}</span>
                <button onClick={() => {setIsPlaying(!isPlaying); setScore(0);}} className={`text-xs px-4 py-1.5 rounded-full font-bold transition ${isPlaying ? 'bg-red-900/50 text-red-400 border border-red-800' : 'bg-green-600 text-white hover:bg-green-500'}`}>

              <div ref={areaRef} className="w-full h-[240px] bg-slate-800 rounded-2xl relative overflow-hidden border border-slate-700 shadow-inner cursor-crosshair">
                {isPlaying && target && (
                  <div
                    key={target.id}
                    onClick={handleHit}
                    className="absolute w-12 h-12 bg-red-500 rounded-full cursor-pointer shadow-[0_0_20px_rgba(239,68,68,0.8)] animate-pulse"
                    style={{ left: target.x, top: target.y }}
                  />
                )}
                {!isPlaying && <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-500 text-center px-4 text-xs sm:text-sm"><Icon name="crosshair" size={40} className="mb-2 opacity-50"/> Nhấn bắt đầu và chạm vào chấm đỏ xuất hiện ngẫu nhiên nhanh nhất có thể!</div>}

        const ColorGame = () => {
          const [level, setLevel] = useState(1);
          const [score, setScore] = useState(0);
          const gridSize = Math.min(Math.floor((level + 10) / 4), 6);
          const totalSquares = gridSize * gridSize;
         
          const generateColors = useCallback(() => {
            const r = Math.floor(Math.random() * 180);
            const g = Math.floor(Math.random() * 180);
            const b = Math.floor(Math.random() * 180);
            const diff = Math.max(6, 45 - level * 1.5);
            const baseColor = `rgb(${r}, ${g}, ${b})`;
            const targetColor = `rgb(${r + diff}, ${g + diff}, ${b + diff})`;
            const targetIndex = Math.floor(Math.random() * totalSquares);
            return { baseColor, targetColor, targetIndex };
          }, [level, totalSquares]);

          const [gameState, setGameState] = useState(generateColors());

          useEffect(() => { setGameState(generateColors()); }, [level, generateColors]);

          const handleSquareClick = (index) => {
            if (index === gameState.targetIndex) {
              setScore(s => s + 1);
              setLevel(prev => prev + 1);
